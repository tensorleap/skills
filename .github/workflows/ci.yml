name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Golden + freshness (Claude wrappers match the proven baselines; dist/ + marketplace.json fresh)
        run: python build/generate.py --check

      - name: Leak scan (no internal references in published files)
        run: python build/leak_scan.py

      - name: Manifest validity (marketplace.json + plugin.json)
        run: python build/check_manifests.py

      - name: py_compile (all Python)
        run: python -m py_compile build/*.py skills/*/scripts/*.py

      - name: shellcheck (installer + skill scripts)
        # Gate at warning: the skill scripts are lifted verbatim and carry only
        # info-level style suggestions (e.g. SC2018/SC2019) we don't rewrite.
        run: |
          shellcheck --version
          shellcheck -S warning install.sh skills/*/scripts/*.sh
