name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Golden + freshness (Claude wrapper must match the proven baseline; dist/ must be fresh)
        run: python build/generate.py --check

      - name: Leak scan (no internal references in published files)
        run: python build/leak_scan.py

      - name: Manifest validity (marketplace.json + plugin.json)
        run: python build/check_manifests.py

      - name: py_compile (all Python)
        run: |
          python -m py_compile \
            build/generate.py \
            build/leak_scan.py \
            build/check_manifests.py \
            skills/tensorleap-integration/scripts/tl_check.py

      - name: shellcheck (installer + skill scripts)
        # Gate at warning: the skill scripts are lifted verbatim and carry only
        # info-level style suggestions (e.g. SC2018/SC2019) we don't rewrite.
        run: |
          shellcheck --version
          shellcheck -S warning install.sh \
            skills/tensorleap-integration/scripts/preflight.sh \
            skills/tensorleap-integration/scripts/run_integration.sh
